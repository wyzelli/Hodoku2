name: Build Windows app image

# Produces the native Windows app image (Hodoku.exe via jpackage), bundles the
# extra runtime data files that used to be copied in by hand, zips it as
# Hodoku-windows.zip, and (on release tags) attaches it to the GitHub Release.
# Code signing via SignPath is scaffolded but stays inert until the signing
# secrets exist (see the "Sign" step and README "Automated Windows builds").

on:
  push:
    # Release tags follow the x.y.z convention (e.g. 2.4.3).
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
    # Also build on main when something that affects the image changes, so
    # regressions are caught before tagging. Kept narrow to avoid over-triggering.
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'hodoku.hcfg'
      - 'reglib-1.3.txt'
      - 'exemplars-1.0.txt'
      - 'release-2.2.txt'
      - '.github/workflows/build-windows.yml'
      - '.signpath/**'
  workflow_dispatch:

permissions:
  contents: write # needed to create/update the GitHub Release on tag pushes

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      # Mapping secrets to env vars lets the signing step be guarded with an
      # `if:` condition (the `secrets` context is not available in `if:`).
      # These are empty until the maintainer adds them (see README).
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # build.gradle pins the Java toolchain to JavaLanguageVersion.of(21),
      # so the CI JDK must be 21 to match the source/target compatibility.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # `build` produces dist/HoDoKu.jar; `jpackageImage` (org.beryx.runtime)
      # produces the native app image at build/jpackage/Hodoku/ with Hodoku.exe.
      - name: Build jar and Windows app image
        shell: bash
        run: ./gradlew.bat --no-daemon clean build jpackageImage

      # These four files were historically copied in by hand next to Hodoku.exe.
      - name: Bundle extra runtime data files into the app image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="build/jpackage/Hodoku"
          test -f "$IMAGE/Hodoku.exe" || { echo "app image / Hodoku.exe not found at $IMAGE"; exit 1; }
          cp hodoku.hcfg reglib-1.3.txt exemplars-1.0.txt release-2.2.txt "$IMAGE/"
          ls -la "$IMAGE"

      # Zip the *contents* of the image folder (Hodoku.exe, app/, runtime/, data
      # files at the root) — matching the existing dist/Hodoku-windows.zip layout,
      # which has no top-level Hodoku/ directory.
      - name: Zip Windows app image
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (Test-Path Hodoku-windows.zip) { Remove-Item Hodoku-windows.zip }
          Compress-Archive -Path build/jpackage/Hodoku/* -DestinationPath Hodoku-windows.zip
          Get-Item Hodoku-windows.zip | Format-List Name, Length

      # ------------------------------------------------------------------ #
      # SignPath code signing (SCAFFOLDED — inert until secrets are added). #
      # ------------------------------------------------------------------ #
      # This step submits Hodoku-windows.zip to SignPath, which signs the
      # Hodoku.exe inside it (per .signpath/artifact-configurations/default.xml)
      # and returns the zip with the signed exe. It is skipped automatically
      # while SIGNPATH_API_TOKEN is empty, so unsigned builds still succeed.
      #
      # TODO(maintainer): after SignPath Foundation approval, fill in the real
      # values below and add repository secrets SIGNPATH_API_TOKEN and
      # SIGNPATH_ORGANIZATION_ID (see README "Automated Windows builds").
      - name: Upload unsigned zip as artifact for signing
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        id: unsigned-artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hodoku-windows-unsigned
          path: Hodoku-windows.zip

      - name: Sign Hodoku.exe via SignPath
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          # TODO(maintainer): replace these placeholders with your real values.
          project-slug: 'hodoku2'                # placeholder
          signing-policy-slug: 'release-signing' # placeholder (e.g. release/test)
          # Matches .signpath/artifact-configurations/default.xml
          artifact-configuration-slug: 'default'
          github-artifact-id: ${{ steps.unsigned-artifact.outputs.artifact-id }}
          wait-for-completion: true
          # Overwrite the local zip with the signed one returned by SignPath.
          output-artifact-directory: '.'

      # Always publish downloadable build artifacts from the Actions run itself,
      # so the zip/jar are retrievable even without a release (or before signing).
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hodoku-windows-build
          path: |
            Hodoku-windows.zip
            dist/HoDoKu.jar
          if-no-files-found: error

      # On release tags only: attach the zip + jar to the GitHub Release,
      # creating the release if it does not exist yet. This removes the manual
      # asset-upload step that has repeatedly failed from restricted environments.
      - name: Attach assets to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Hodoku ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            Hodoku-windows.zip
            dist/HoDoKu.jar
